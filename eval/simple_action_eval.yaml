# Basic ParaView Visualization Function Tests - Action Level
# These tests evaluate individual ParaView MCP server functions for visualization tasks
# Each test focuses on a single function call with appropriate parameters
# Tests follow a logical visualization workflow

# === Data Loading and Setup Tests ===

# Test 1: clear_pipeline_and_reset - Start with clean state
- vars:
    question: |
      Use the clear_pipeline_and_reset function to ensure ParaView starts in a clean state.
      Respond with <1> if the pipeline was successfully cleared, or <0> if it failed. Give a simple reason and end with a <1> and <0>
  assert:
    - type: contains-all
      value: "<1>"
    - type: not-contains
      value: "<0>"
  options:
    cache: false
    runSerially: true

# Test 2: load_data - Load a vector field dataset
- vars:
    question: |
      Use the load_data function to load the file "eval/eval_examples/stream_line/disk.ex2".
      Respond with <1> if the file was successfully loaded, or <0> if it failed. Give a simple reason and end with a <1> and <0>
  assert:
    - type: contains-all
      value: "<1>"
    - type: not-contains
      value: "<0>"
  options:
    cache: false
    runSerially: true

# Test 3: get_available_arrays - Inspect available data fields
- vars:
    question: |
      Use the get_available_arrays function to check what data fields are available in the loaded dataset.
      Respond with <1> if you successfully retrieved array information, or <0> if it failed. Give a simple reason and end with a <1> and <0>
  assert:
    - type: contains-all
      value: "<1>"
    - type: not-contains
      value: "<0>"
  options:
    cache: false
    runSerially: true

# Test 4: reset_camera - Set proper view
- vars:
    question: |
      Use the reset_camera function to properly frame the loaded data with default padding.
      Respond with <1> if the camera was successfully reset, or <0> if it failed. Give a simple reason and end with a <1> and <0>
  assert:
