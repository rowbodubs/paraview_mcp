# Comprehensive Data Identification Test Cases for SciVisAgentBench
# This test evaluates the ability to identify and understand data content
# without prior knowledge from metadata or naming patterns

# 1. Aneurism Dataset
- vars:
    question: |
        Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/aneurism/data/aneurism_256x256x256_uint8.raw".
        Use visualization tools to determine what object or structure is contained in this dataset.
        Take a screenshot and provide a textual report identifying what you observe in the data.
  assert:
    - type: llm-rubric
      value: |
          The assistant should identify the data shows an aneurism or vascular structure

