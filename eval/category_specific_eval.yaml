# Generic Neural/Biological Test - Applied to: neocortical_layer_1_axons, mri_ventricles
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/neocortical_layer_1_axons/data/neocortical_layer_1_axons_1464x1033x76_uint8.raw".
      1. Note the very thin z-dimension (76) vs x,y (1464x1033) - this is a tissue slice
      2. Create appropriate visualization for this thin slab
      3. Adjust contrast/opacity to reveal structures
      4. Report: Are there branching/network patterns visible (yes) or uniform distribution (no)?
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Recognize thin slab geometry
        - Choose appropriate visualization for 2.5D data
        - Enhance contrast appropriately
