# Test 11: Marine Biology Specimen
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/lobster/data/lobster_301x324x56_uint8.raw".
      1. Create visualization showing the exoskeleton and internal anatomy
      2. Adjust the visualization to show the prominent structure
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Choose appropriate visualization for exoskeleton (isosurface or volume)
        - Use screenshot to verify whether specific features can be identified: claws, abdomen, tail fan

# Test 12: Fish Anatomy Visualization  
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/carp/data/carp_256x256x512_uint16.raw".
      1. Enable volume rendering to show internal fish anatomy
      2. Adjust transfer functions to reveal skeletal structure and organs
      3. Reset camera with appropriate padding to frame the entire fish
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - The volume rendering show both skeleton and organs
        - The final frame work show the entire fish with margin


# ==============================================================================
# ENGINEERING & MECHANICAL CATEGORY
# ==============================================================================

# Generic Engineering Test
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/engine/data/engine_256x256x128_uint8.raw".
      1. Create an isosurface to reveal the solid structure
      2. Apply metallic gray coloring
      3. Create a clip plane to show internal details
      4. Save the isosurface as "component.stl"
      5. Report: How many cylinder this engine has?
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Create isosurface of the component
        - Apply gray/metallic coloring
        - Use clip plane to reveal internals
        - Successfully save STL file
        - The correct answer is 2 cylinders

# ==============================================================================
# FLOW & FLUID DYNAMICS CATEGORY
# ==============================================================================

# Generic Flow Test - Applied to: tacc_turbulence, tornado, duct, shockwave
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/tacc_turbulence/data/tacc_turbulence_256x256x256_float32.raw".
      1. Create an isosurface to reveal flow structures
      2. Create three orthogonal slice planes through the center
      3. Apply a "Cool to Warm" or similar diverging color map
      4. Take screenshots from two different angles
      5. Report: Are there more than 5 distinct vortex/swirl structures visible?
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Create isosurface showing flow structures
        - Create three orthogonal slices
        - Apply diverging color map
        - Take at least 2 screenshots
        - Answer yes/no to whether more than 5 vortices are visible

# ==============================================================================
# COMBUSTION & REACTION CATEGORY
# ==============================================================================

# Generic Combustion Test - Applied to: csafe_heptane, fuel
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/csafe_heptane/data/csafe_heptane_302x302x302_uint8.raw".
      1. Create volume rendering to visualize the reaction/mixing zone
      2. Create isosurfaces at 3 different threshold values (low, medium, high)
      3. Apply temperature-appropriate coloring (blue for cold, red for hot)
      4. Report: Do the high-value regions form a connected structure or separate islands?
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Enable volume rendering
        - Create 3 isosurfaces at different values
        - Apply blue-to-red temperature coloring
        - Answer whether high-value regions are connected or separated

# ==============================================================================
# MOLECULAR & ATOMIC CATEGORY  
# ==============================================================================

# Generic Molecular Test - Applied to: hydrogen_atom, nucleon, neghip, silicium
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/hydrogen_atom/data/hydrogen_atom_128x128x128_uint8.raw".
      1. Create volume rendering to show the probability/density distribution
      2. Create isosurfaces at 20%, 50%, and 80% of the maximum value
      3. Take screenshots showing all three isosurfaces together
      4. Report: Is the structure spherically symmetric (yes) or does it have directional lobes (no)?
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Create volume rendering
        - Create 3 isosurfaces at percentage-based thresholds
        - Show nested isosurfaces in screenshot
        - Answer yes (spherical) or no (has lobes/directionality)

# ==============================================================================
# ASTROPHYSICAL PHENOMENA CATEGORY
# ==============================================================================

# Generic Astrophysics Test - Applied to: supernova, tornado (when vector data)
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/supernova/data/supernova_256x256x256_float32.raw".
      1. Create volume rendering to show the explosion/phenomenon
      2. Create orthogonal slices through the center
      3. Apply a high-energy color map (e.g., "Black-Body Radiation" or "Hot")
      4. Take screenshots from at least two angles
      5. Report: Is the structure predominantly spherical (yes) or does it show clear asymmetry/jets (no)?
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Enable volume rendering for the phenomenon
        - Create orthogonal slices
        - Apply appropriate high-energy coloring
        - Answer yes (spherical) or no (asymmetric/jets)

