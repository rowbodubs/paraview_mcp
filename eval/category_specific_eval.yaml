# Test 14 Generic Scanned Object Test - Applied to: bunny, boston_teapot, statue_leg, bonsai
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/bunny/data/bunny_512x512x361_uint16.raw".
      1. Create an isosurface at an appropriate threshold for surface extraction
      2. Apply a single color of your choice
      3. Take screenshots from front, side, and top views
      4. Report: Does the object have protruding appendages/features extending from a main body (yes/no)?
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Extract clean surface with isosurface
        - Apply consistent coloring
        - Take 3 orthogonal screenshots
        - Answer yes (bunny has ears) about protruding features


## Test 15 Generic Synthetic Pattern Test - Applied to: marschner_lobb
- vars:
    question: |
      Clear the ParaView pipeline and load the data file "../SciVisAgentBench-tasks/marschner_lobb/data/marschner_lobb_41x41x41_uint8.raw".
      1. Create volume rendering
      2. Create multiple isosurfaces at regular intervals
      3. Report: Does the pattern show concentric/nested structures (yes) or random distribution (no)?
  assert:
    - type: llm-rubric
      value: |
        The assistant should:
        - Create volume rendering of test pattern
        - Create multiple evenly-spaced isosurfaces
        - Identify the mathematical/regular nature
        - Answer yes about concentric structures