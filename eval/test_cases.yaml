# Test 12: create_vector_visualization - Visualize vectors with arrows
- vars:
    question: |
      Clean up ParaView and load the file "eval/eval_examples/stream_line/disk.ex2".
      Set the active source to the loaded data, then create arrow glyphs to visualize the "V" vector field.
  assert:
    - type: llm-rubric
      value: |
        Check if the response indicates that:
        1. clear_pipeline_and_reset or similar cleanup was performed
        2. load_data was called with the correct file
        3. set_active_source was called appropriately
        4. create_vector_visualization was called with "V" vector field
        5. The vector visualization was successfully created
        Pass if all operations completed successfully.
  options:
    cache: false
    runSerially: true