# Test 1: create sphere object
- vars:
    question: |
      "Clear the pipeline in paraview, set the background to white, then create a sphere in ParaView, use the get_screenshot tool to get the screenshot in viewport."
  assert:
    # - type: icontains
    #   value: 'sphere'

    # Check if response contains multiple values
    # - type: contains-all
    #   value: 
    #     - "screenshot"
    #     - "sphere"

    # do check with another LLM
    # - type: llm-rubric
    #   value: "The output image show that a sphere"

    - type: llm-rubric
      value: |
        1. Successful creation of a sphere in ParaView
        2. Check if the screenshot is a Sphere using visual understanding

  options:
    cache: false
    runSerially: true
    
