# Test 2: Delaunay triangulation 
- vars:
    question: |
      First clear the ParaView pipeline to ensure a clean state. Then load the "eval/eval_examples/triangulation/can.ex2" file in 
      ParaView. Generate an 3d Delaunay triangulation of the dataset. If that operation can not be done state the mcp do not have such functionality.
  assert:
    - type: contains-all
      value: 
        - "can.ex2"
    - type: llm-rubric
      value: |
        1. Successfully loaded the can.ex2 file
        2. Created 3d  Delaunay triangulation mesh of the data
  options:
    cache: false
    runSerially: true